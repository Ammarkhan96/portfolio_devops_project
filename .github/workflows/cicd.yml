name: DevSecOps Pipeline

on:
  push:
    branches:
      - main

jobs:

  build:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node JS
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Dependencies
        run: npm install

      - name: Build Application
        run: npm run build

      - name: Build Docker Image
        run: docker build -t ammar-portfolio:${{ github.sha }} .

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ammar-portfolio:${{ github.sha }} 
          formate: table
          exit-code: 0

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image
        run: |
          docker tag ammar-portfolio:${{ github.sha }} ${{ secrets.DOCKER_USERNAME }}/ammar-portfolio:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/ammar-portfolio:latest
